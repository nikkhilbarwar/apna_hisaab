name: apna_hisaab
description: "Professional Cart Sale Management App"
publish_to: 'none'
version: 1.0.2+21

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  connectivity_plus: ^6.1.3
  shared_preferences: ^2.3.5
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.5
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  workmanager: ^0.9.0+3
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  fl_chart: ^0.70.0
  url_launcher: ^6.3.1
  flutter_colorpicker: ^1.1.0
  device_info_plus: ^11.3.0
  share_plus: ^12.0.1
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  flutter_pos_printer_platform_image_3: ^1.2.4
  esc_pos_utils_plus: ^2.0.4
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  image: ^4.1.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#666fed"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
